name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and run tests
    runs-on: ubuntu-latest

    env:
      DEVELOCITY_URL: https://develocity-ext-github.grdev.net

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Develocity for npm
        uses: gradle/develocity-actions/setup-npm@974e8dbcbda40db6828fc35f349c80a7c0e71529 #v2.1
        with:
          develocity-injection-enabled: true
          develocity-access-key: >
            develocity-ext-github.grdev.net=${{ secrets.DEVELOCITY_ACCESS_KEY }}
          develocity-url: https://develocity-ext-github.grdev.net

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-test
        run: npm run test

      - name: Package
        id: npm-package
        run: npm run package
