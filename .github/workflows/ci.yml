name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      # Build Scan publishing is disabled: develocity-ext-github.grdev.net was removed on
      # 2026-07-16, and this public repo cannot use the internal warp-connect action that
      # internal repos use to reach develocity.grdev.net.
      #
      # To re-enable publishing:
      #   1. Pick a target instance: develocity.grdev.net once a public-repo WARP path
      #      exists, or ge.solutions-team.gradle.com (internet-reachable; used by the
      #      public gradle/develocity-actions and gradle/actions repos).
      #   2. Rotate the DEVELOCITY_ACCESS_KEY repo secret to a key issued by that instance.
      #   3. Uncomment the steps below, updating the host in develocity-access-key and
      #      develocity-url. For the WARP path, also restore `id-token: write` in this
      #      job's permissions and uncomment the Get Secrets and warp-connect steps.
      #
      # - name: Get Secrets
      #   uses: gradle/actions-internal/get-aws-secrets@v1
      #   if: github.repository_owner == 'gradle'
      #   continue-on-error: true
      #   with:
      #     role-to-assume: arn:aws:iam::992382829881:role/GHASecrets_develocity-provenance-governor-actions_all
      #     secret-ids: |
      #       WARP_CLIENT_ID,gha/_shared/_all/warp_basic_access_client_id
      #       WARP_CLIENT_SECRET,gha/_shared/_all/warp_basic_access_client_secret
      #
      # - name: Connect to Gradle internal network
      #   uses: gradle/gradle-github-actions/warp-connect@46afa575b7b38083048d98686119ee23ab41125d
      #   continue-on-error: true
      #   with:
      #     client_id: ${{ env.WARP_CLIENT_ID }}
      #     client_secret: ${{ env.WARP_CLIENT_SECRET }}
      #     organization: 'gradle'
      #
      # - name: Setup Develocity for npm
      #   uses: gradle/develocity-actions/setup-npm@0e1f30c14ab56d0c1ecf229a0ffc3eb3e40e4642 #v2.2
      #   with:
      #     develocity-injection-enabled: true
      #     develocity-access-key: >
      #       develocity.grdev.net=${{ secrets.DEVELOCITY_ACCESS_KEY }}
      #     develocity-url: https://develocity.grdev.net

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-test
        run: npm run test

      - name: Package
        id: npm-package
        run: npm run package
