name: CI-update-dist

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'prerelease/**'
      - 'release/**'
    paths-ignore:
      - 'dist/**'

permissions:
  contents: read

jobs:
  update-dist:
    # Only run for the Gradle repository; otherwise when users create pull requests from their `main` branch
    # it would erroneously update `dist` on their branch (and the pull request).
    if: github.repository == 'gradle/develocity-provenance-governor-actions'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Get Secrets
        uses: gradle/actions-internal/get-aws-secrets@v1
        if: github.repository_owner == 'gradle'
        continue-on-error: true
        with:
          role-to-assume: arn:aws:iam::992382829881:role/GHASecrets_develocity-provenance-governor-actions_all
          secret-ids: |
            WARP_CLIENT_ID,gha/_shared/_all/warp_basic_access_client_id
            WARP_CLIENT_SECRET,gha/_shared/_all/warp_basic_access_client_secret

      - name: Connect to Gradle internal network
        uses: gradle/gradle-github-actions/warp-connect@46afa575b7b38083048d98686119ee23ab41125d
        continue-on-error: true
        with:
          client_id: ${{ env.WARP_CLIENT_ID }}
          client_secret: ${{ env.WARP_CLIENT_SECRET }}
          organization: 'gradle'

      - name: Setup Develocity for npm
        uses: gradle/develocity-actions/setup-npm@0e1f30c14ab56d0c1ecf229a0ffc3eb3e40e4642 #v2.2
        with:
          develocity-injection-enabled: true
          develocity-access-key: >
            develocity.grdev.net=${{ secrets.DEVELOCITY_ACCESS_KEY }}
          develocity-url: https://develocity.grdev.net

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Build distribution
        run: npm run package

      # Create or update a pull request with dist changes.
      # Direct push to main is blocked by branch protection ("Changes must be made through a pull request"),
      # so the bot opens a PR for review instead.
      - name: Create dist update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          author: bot-githubaction <bot-githubaction@gradle.com>
          committer: bot-githubaction <bot-githubaction@gradle.com>
          commit-message: '[bot] Update dist directory'
          add-paths: |
            dist/**
          branch: bot/update-dist-${{ github.ref_name }}
          base: ${{ github.ref_name }}
          title: '[bot] Update dist directory'
          body: |
            Automated dist update generated from `${{ github.ref_name }}`.

            - Trigger: `${{ github.workflow }}`
            - Commit: `${{ github.sha }}`
          labels: |
            automation
